name: build-test-release

on:
  workflow_dispatch:
  push:
    tags:
      - v*
  pull_request:

permissions:
  contents: write

jobs:
  lint-linux:
    name: lint linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy clang-format libcurl4-openssl-dev

      - name: lint
        run: make CC=clang clang-format clang-tidy

  lint-macos:
    name: lint macos
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: install
        run: |
          brew install llvm curl
          echo "$(brew --prefix llvm)/bin" >> $GITHUB_PATH

      - name: lint
        run: make CC=clang clang-format clang-tidy

  dist:
    runs-on: ${{ matrix.runner }}
    name: dist ${{ matrix.name }}
    needs:
      - lint-linux
      - lint-macos
    strategy:
      fail-fast: false
      matrix:
        include:
          # ----------------------------------------------------------
          # Linux: cross-compiled on ubuntu-latest.
          # Fully static binaries via musl + vendored deps.
          # ----------------------------------------------------------
          - name: linux-amd64
            runner: ubuntu-latest
            cc: x86_64-linux-gnu-gcc
            apt: gcc-x86-64-linux-gnu
            dist: targz-pkg

          - name: linux-arm64
            runner: ubuntu-latest
            cc: aarch64-linux-gnu-gcc
            apt: gcc-aarch64-linux-gnu
            dist: targz-pkg

          - name: linux-armel
            runner: ubuntu-latest
            cc: arm-linux-gnueabi-gcc
            apt: gcc-arm-linux-gnueabi
            dist: targz-pkg

          - name: linux-armhf
            runner: ubuntu-latest
            cc: arm-linux-gnueabihf-gcc
            apt: gcc-arm-linux-gnueabihf
            dist: targz-pkg

          - name: linux-ppc64el
            runner: ubuntu-latest
            cc: powerpc64le-linux-gnu-gcc
            apt: gcc-powerpc64le-linux-gnu
            dist: targz-pkg

          - name: linux-riscv64
            runner: ubuntu-latest
            cc: riscv64-linux-gnu-gcc
            apt: gcc-riscv64-linux-gnu
            dist: targz-pkg

          - name: linux-i386
            runner: ubuntu-latest
            cc: i686-linux-gnu-gcc
            apt: gcc-i686-linux-gnu
            dist: targz-pkg

          - name: linux-s390x
            runner: ubuntu-latest
            cc: s390x-linux-gnu-gcc
            apt: gcc-s390x-linux-gnu
            dist: targz-pkg

          # ----------------------------------------------------------
          # Windows: cross-compiled on ubuntu-latest.
          # amd64/i386 use gcc-mingw-w64 from apt;
          # arm64 uses llvm-mingw (fetched via Makefile.llvm-mingw).
          # ----------------------------------------------------------
          - name: windows-amd64
            runner: ubuntu-latest
            cc: x86_64-w64-mingw32-gcc
            apt: gcc-mingw-w64-x86-64
            dist: zip-pkg

          - name: windows-i386
            runner: ubuntu-latest
            cc: i686-w64-mingw32-gcc
            apt: gcc-mingw-w64-i686
            dist: zip-pkg

          - name: windows-arm64
            runner: ubuntu-latest
            cc: aarch64-w64-mingw32-clang
            llvm_mingw: true
            dist: zip-pkg

          # ----------------------------------------------------------
          # macOS: on native runners (cross-compiling Darwin needs
          # the Apple SDK).  Static deps, dynamic system frameworks.
          # ----------------------------------------------------------
          - name: macos-arm64
            runner: macos-latest
            cc: clang
            brew: coreutils cmake
            dist: targz-pkg

          - name: macos-amd64
            runner: macos-15-intel
            cc: clang
            brew: coreutils cmake
            dist: targz-pkg

    steps:
      - uses: actions/checkout@v4

      - name: install (apt)
        if: matrix.apt
        run: |
          sudo apt-get update
          sudo apt-get install -y make cmake curl bzip2 file zip ${{ matrix.apt }}

      - name: install (llvm-mingw)
        if: matrix.llvm_mingw
        run: |
          sudo apt-get update
          sudo apt-get install -y make cmake curl bzip2 file zip
          make -f Makefile.llvm-mingw
          echo "$PWD/llvm-mingw/bin" >> $GITHUB_PATH

      - name: install (brew)
        if: matrix.brew
        run: brew install ${{ matrix.brew }}

      - name: build
        run: make STATIC=1 CC=${{ matrix.cc }} ${{ matrix.dist }}

      - name: verify
        run: file build/ice*

      - name: sign binaries
        if: |
          (startsWith(matrix.name, 'windows-') || startsWith(matrix.name, 'macOS-')) &&
          startsWith(github.ref, 'refs/tags/')
        uses: espressif/release-sign@master
        with:
          path: ./build
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-keyvault-uri: ${{ secrets.AZURE_KEYVAULT_URI }}
          azure-keyvault-cert-name: ${{ secrets.AZURE_KEYVAULT_CERT_NAME }}
          macos-signing-identity: ${{ secrets.MACOS_CS_IDENTITY_ID }}
          macos-certificate: ${{ secrets.MACOS_CS_CERTIFICATE }}
          macos-certificate-pwd: ${{ secrets.MACOS_CS_CERTIFICATE_PWD }}
          notarization-username: ${{ secrets.MACOS_CS_APPLE_ID }}
          notarization-password: ${{ secrets.MACOS_CS_APP_SPECIFIC_PASSWORD }}
          notarization-team-id: ${{ secrets.MACOS_CS_APPLE_TEAM_ID }}

      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/*

  release:
    if: startsWith(github.ref, 'refs/tags/')
    name: release
    needs:
      - dist
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: install commitizen
        run: pip install czespressif

      - name: get version
        id: get_version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
          fi
          echo "VERSION=$VERSION" | tee -a $GITHUB_OUTPUT

      - name: generate changelog
        run: |
          cz changelog ${{ steps.get_version.outputs.VERSION }} --file-name changelog_body.md
          cat changelog_body.md

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: changelog_body.md
          name: Version ${{ steps.get_version.outputs.version }}
          draft: true
          files: |
            artifacts/**/*
