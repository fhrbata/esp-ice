name: build-test-release

on:
  workflow_dispatch:
  push:
    tags:
      - v*
  pull_request:

permissions:
  contents: write

jobs:
  lint-linux:
    name: lint linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy clang-format libcurl4-openssl-dev

      - name: lint
        run: make CC=clang clang-format clang-tidy

  lint-windows:
    name: lint windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: install
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: true
          install: >-
            mingw-w64-clang-x86_64-clang-tools-extra
            mingw-w64-clang-x86_64-clang
            mingw-w64-clang-x86_64-curl
            make
            diffutils

      - name: lint
        shell: msys2 {0}
        run: make CC=clang clang-format clang-tidy

  lint-macos:
    name: lint macos
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: install
        run: |
          brew install llvm curl
          echo "$(brew --prefix llvm)/bin" >> $GITHUB_PATH

      - name: lint
        run: make CC=clang clang-format clang-tidy

  dist:
    runs-on: ${{ matrix.runner }}
    name: dist ${{ matrix.name }}
    needs:
      - lint-linux
      - lint-windows
      - lint-macos
    strategy:
      fail-fast: false
      matrix:
        include:
          # ----------------------------------------------------------
          # Linux: native or cross-compiled.
          # Fully static binaries via musl + vendored deps.
          # ----------------------------------------------------------
          - name: linux-amd64
            runner: ubuntu-latest
            dist: targz-pkg

          - name: linux-arm64
            runner: ubuntu-24.04-arm
            dist: targz-pkg

          - name: linux-armel
            runner: ubuntu-latest
            cross_compile: arm-linux-gnueabi-
            cross_pkg: gcc-arm-linux-gnueabi
            dist: targz-pkg

          - name: linux-armhf
            runner: ubuntu-latest
            cross_compile: arm-linux-gnueabihf-
            cross_pkg: gcc-arm-linux-gnueabihf
            dist: targz-pkg

          - name: linux-ppc64el
            runner: ubuntu-latest
            cross_compile: powerpc64le-linux-gnu-
            cross_pkg: gcc-powerpc64le-linux-gnu
            dist: targz-pkg

          - name: linux-riscv64
            runner: ubuntu-latest
            cross_compile: riscv64-linux-gnu-
            cross_pkg: gcc-riscv64-linux-gnu
            dist: targz-pkg

          - name: linux-i386
            runner: ubuntu-latest
            cross_compile: i686-linux-gnu-
            cross_pkg: gcc-i686-linux-gnu
            dist: targz-pkg

          - name: linux-s390x
            runner: ubuntu-latest
            cross_compile: s390x-linux-gnu-
            cross_pkg: gcc-s390x-linux-gnu
            dist: targz-pkg

          # ----------------------------------------------------------
          # macOS: static libcurl, dynamic system frameworks
          # ----------------------------------------------------------
          - name: macos-arm64
            runner: macos-latest
            dist: targz-pkg

          - name: macos-amd64
            runner: macos-15-intel
            dist: targz-pkg

          # ----------------------------------------------------------
          # Windows: MSYS2 with MinGW static libcurl (mbedTLS)
          # ----------------------------------------------------------
          - name: windows-amd64
            runner: windows-latest
            msystem: MINGW64
            mingw_prefix: mingw-w64-x86_64
            dist: zip-pkg

          - name: windows-i386
            runner: windows-latest
            msystem: MINGW32
            mingw_prefix: mingw-w64-i686
            dist: zip-pkg

          - name: windows-arm64
            runner: windows-11-arm
            msystem: CLANGARM64
            mingw_prefix: mingw-w64-clang-aarch64
            dist: zip-pkg

    steps:
      - uses: actions/checkout@v4

      # ----- Linux (native) -----
      - name: build linux
        if: startsWith(matrix.name, 'linux-') && !matrix.cross_compile
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make cmake curl bzip2
          make STATIC=1 ${{ matrix.dist }}
          build/ice --version

      # ----- Linux (cross-compiled) -----
      - name: build linux (cross)
        if: matrix.cross_compile
        run: |
          sudo apt-get update
          sudo apt-get install -y make cmake curl bzip2 qemu-user-static ${{ matrix.cross_pkg }}
          make STATIC=1 CROSS_COMPILE=${{ matrix.cross_compile }} ${{ matrix.dist }}
          build/ice --version

      # ----- macOS -----
      # Static deps (zlib, mbedTLS, curl), dynamic system frameworks.
      - name: build macos
        if: startsWith(matrix.name, 'macos-')
        run: |
          brew install coreutils cmake
          make STATIC=1 ${{ matrix.dist }}
          build/ice --version

      # ----- Windows (MSYS2) -----
      # Build zlib + mbedTLS + curl from source with MinGW.
      - name: setup msys2
        if: startsWith(matrix.name, 'windows-')
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: >-
            ${{ matrix.mingw_prefix }}-gcc
            ${{ matrix.mingw_prefix }}-cmake
            make
            zip
            curl
            diffutils

      - name: build windows
        if: startsWith(matrix.name, 'windows-')
        shell: msys2 {0}
        run: |
          make STATIC=1 ${{ matrix.dist }}
          build/ice.exe --version

      - name: sign binaries
        if: |
          (startsWith(matrix.name, 'windows-') || startsWith(matrix.name, 'macOS-')) &&
          startsWith(github.ref, 'refs/tags/')
        uses: espressif/release-sign@master
        with:
          path: ./build
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-keyvault-uri: ${{ secrets.AZURE_KEYVAULT_URI }}
          azure-keyvault-cert-name: ${{ secrets.AZURE_KEYVAULT_CERT_NAME }}
          macos-signing-identity: ${{ secrets.MACOS_CS_IDENTITY_ID }}
          macos-certificate: ${{ secrets.MACOS_CS_CERTIFICATE }}
          macos-certificate-pwd: ${{ secrets.MACOS_CS_CERTIFICATE_PWD }}
          notarization-username: ${{ secrets.MACOS_CS_APPLE_ID }}
          notarization-password: ${{ secrets.MACOS_CS_APP_SPECIFIC_PASSWORD }}
          notarization-team-id: ${{ secrets.MACOS_CS_APPLE_TEAM_ID }}

      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/*

  release:
    if: startsWith(github.ref, 'refs/tags/')
    name: release
    needs:
      - dist
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: install commitizen
        run: pip install czespressif

      - name: get version
        id: get_version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
          fi
          echo "VERSION=$VERSION" | tee -a $GITHUB_OUTPUT

      - name: generate changelog
        run: |
          cz changelog ${{ steps.get_version.outputs.VERSION }} --file-name changelog_body.md
          cat changelog_body.md

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: changelog_body.md
          name: Version ${{ steps.get_version.outputs.version }}
          draft: true
          files: |
            artifacts/**/*
