name: build-test-release

on:
  workflow_dispatch:
  push:
    tags:
      - v*
  pull_request:

permissions:
  contents: write

jobs:
  lint-linux:
    name: lint linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy clang-format libcurl4-openssl-dev

      - name: lint
        run: make CC=clang clang-format clang-tidy

  lint-windows:
    name: lint windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: install
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: true
          install: >-
            mingw-w64-clang-x86_64-clang-tools-extra
            mingw-w64-clang-x86_64-clang
            mingw-w64-clang-x86_64-curl
            make
            diffutils

      - name: lint
        shell: msys2 {0}
        run: make CC=clang clang-format clang-tidy

  lint-macos:
    name: lint macos
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: install
        run: |
          brew install llvm curl
          echo "$(brew --prefix llvm)/bin" >> $GITHUB_PATH

      - name: lint
        run: make CC=clang clang-format clang-tidy

  dist:
    runs-on: ${{ matrix.runner }}
    name: dist ${{ matrix.name }}
    needs:
      - lint-linux
      - lint-windows
      - lint-macos
    strategy:
      fail-fast: false
      matrix:
        include:
          # ----------------------------------------------------------
          # Linux: Alpine Docker + QEMU user-mode for non-native archs.
          # All builds are "native" inside the container -- gcc runs
          # as a process of the target architecture, no cross-compilers.
          # Fully static binaries (musl + curl-static + openssl-static).
          # ----------------------------------------------------------
          # All 7 Debian Trixie architectures
          - name: linux-amd64
            runner: ubuntu-latest
            platform: linux/amd64
            dist: targz-pkg

          - name: linux-arm64
            runner: ubuntu-latest
            platform: linux/arm64
            dist: targz-pkg

          - name: linux-armel
            runner: ubuntu-latest
            platform: linux/arm/v5
            dist: targz-pkg

          - name: linux-armhf
            runner: ubuntu-latest
            platform: linux/arm/v7
            dist: targz-pkg

          - name: linux-riscv64
            runner: ubuntu-latest
            platform: linux/riscv64
            dist: targz-pkg

          # ----------------------------------------------------------
          # macOS: static libcurl, dynamic system frameworks
          # ----------------------------------------------------------
          - name: macos-arm64
            runner: macos-latest
            dist: targz-pkg

          - name: macos-x86-64
            runner: macos-15-intel
            dist: targz-pkg

          # ----------------------------------------------------------
          # Windows: MSYS2 with MinGW static libcurl (Schannel TLS)
          # ----------------------------------------------------------
          - name: windows-x86_64
            runner: windows-latest
            msystem: MINGW64
            mingw_prefix: mingw-w64-x86_64
            dist: zip-pkg

          - name: windows-i686
            runner: windows-latest
            msystem: MINGW32
            mingw_prefix: mingw-w64-i686
            dist: zip-pkg

    steps:
      - uses: actions/checkout@v4

      # ----- Linux (Docker + QEMU) -----
      # Build musl + zlib + BearSSL + curl from source inside Docker.
      # Fully static binary, runs on any Linux.
      - name: setup qemu
        if: startsWith(matrix.name, 'linux-')
        uses: docker/setup-qemu-action@v3

      - name: build linux
        if: startsWith(matrix.name, 'linux-')
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            -v ${{ github.workspace }}:/work -w /work \
            debian:trixie-slim sh -c '
              apt-get update && apt-get install -y gcc make curl &&
              make -f Makefile.deps &&
              make STATIC=1 ${{ matrix.dist }}
            '

      # ----- macOS -----
      # Build zlib + BearSSL + curl from source. Static deps,
      # dynamic system frameworks.
      - name: build macos
        if: startsWith(matrix.name, 'macos-')
        run: |
          brew install coreutils
          make -f Makefile.deps
          make STATIC=1 ${{ matrix.dist }}

      # ----- Windows (MSYS2) -----
      # Build zlib + BearSSL + curl from source with MinGW.
      - name: setup msys2
        if: startsWith(matrix.name, 'windows-')
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: >-
            ${{ matrix.mingw_prefix }}-gcc
            make
            zip
            curl

      - name: build windows
        if: startsWith(matrix.name, 'windows-')
        shell: msys2 {0}
        run: |
          make -f Makefile.deps
          make STATIC=1 ${{ matrix.dist }}

      - name: sign binaries
        if: |
          (startsWith(matrix.name, 'windows-') || startsWith(matrix.name, 'macOS-')) &&
          startsWith(github.ref, 'refs/tags/')
        uses: espressif/release-sign@master
        with:
          path: ./build
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-keyvault-uri: ${{ secrets.AZURE_KEYVAULT_URI }}
          azure-keyvault-cert-name: ${{ secrets.AZURE_KEYVAULT_CERT_NAME }}
          macos-signing-identity: ${{ secrets.MACOS_CS_IDENTITY_ID }}
          macos-certificate: ${{ secrets.MACOS_CS_CERTIFICATE }}
          macos-certificate-pwd: ${{ secrets.MACOS_CS_CERTIFICATE_PWD }}
          notarization-username: ${{ secrets.MACOS_CS_APPLE_ID }}
          notarization-password: ${{ secrets.MACOS_CS_APP_SPECIFIC_PASSWORD }}
          notarization-team-id: ${{ secrets.MACOS_CS_APPLE_TEAM_ID }}

      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/*

  release:
    if: startsWith(github.ref, 'refs/tags/')
    name: release
    needs:
      - dist
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: install commitizen
        run: pip install czespressif

      - name: get version
        id: get_version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
          fi
          echo "VERSION=$VERSION" | tee -a $GITHUB_OUTPUT

      - name: generate changelog
        run: |
          cz changelog ${{ steps.get_version.outputs.VERSION }} --file-name changelog_body.md
          cat changelog_body.md

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: changelog_body.md
          name: Version ${{ steps.get_version.outputs.version }}
          draft: true
          files: |
            artifacts/**/*
