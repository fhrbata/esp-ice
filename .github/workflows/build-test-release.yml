name: build-test-release

on:
  workflow_dispatch:
  push:
    tags:
      - v*
  pull_request:

permissions:
  contents: write

jobs:
  format:
    name: format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - run: python -m pip install pre-commit
      - run: pre-commit run --all-files --show-diff-on-failure

  test-linux:
    name: test linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: install
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy libcurl4-openssl-dev zlib1g-dev liblzma-dev

      - name: lint
        run: make CC=clang clang-tidy

      - name: test
        run: make CC=clang test

      - name: upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: t_out-linux
          path: t_out/
          retention-days: 7

  test-windows:
    name: test windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: install
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: true
          install: >-
            mingw-w64-clang-x86_64-clang-tools-extra
            mingw-w64-clang-x86_64-clang
            mingw-w64-clang-x86_64-cmake
            mingw-w64-clang-x86_64-curl
            mingw-w64-clang-x86_64-zlib
            mingw-w64-clang-x86_64-xz
            make
            diffutils
            perl
            python
            zip

      - name: lint
        shell: msys2 {0}
        run: make CC=clang clang-tidy

      - name: test
        shell: msys2 {0}
        run: make CC=clang test

      - name: upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: t_out-windows
          path: t_out/
          retention-days: 7

  test-macos:
    name: test macos
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: install
        run: |
          brew install llvm xz zlib
          echo "$(brew --prefix llvm)/bin" >> $GITHUB_PATH
          echo "CPATH=$(brew --prefix)/include" >> $GITHUB_ENV

      - name: lint
        run: make CC=clang clang-tidy

      - name: test
        run: make CC=clang test

      - name: upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: t_out-macos
          path: t_out/
          retention-days: 7

  dist:
    runs-on: ${{ matrix.runner }}
    name: dist ${{ matrix.name }}
    needs:
      - format
      - test-linux
      - test-windows
      - test-macos
    strategy:
      fail-fast: false
      matrix:
        include:
          # ----------------------------------------------------------
          # Linux: cross-compiled on ubuntu-latest via musl.cc
          # toolchains fetched by Makefile.toolchain.
          # ----------------------------------------------------------
          - name: linux-amd64
            runner: ubuntu-latest
            toolchain: linux-amd64
            cc: x86_64-linux-musl-gcc
            dist: targz-pkg

          - name: linux-arm64
            runner: ubuntu-latest
            toolchain: linux-arm64
            cc: aarch64-linux-musl-gcc
            dist: targz-pkg

          - name: linux-armel
            runner: ubuntu-latest
            toolchain: linux-armel
            cc: arm-linux-musleabi-gcc
            dist: targz-pkg

          - name: linux-armhf
            runner: ubuntu-latest
            toolchain: linux-armhf
            cc: arm-linux-musleabihf-gcc
            dist: targz-pkg

          - name: linux-i386
            runner: ubuntu-latest
            toolchain: linux-i386
            cc: i686-linux-musl-gcc
            dist: targz-pkg

          - name: linux-ppc64el
            runner: ubuntu-latest
            toolchain: linux-ppc64el
            cc: powerpc64le-linux-musl-gcc
            dist: targz-pkg

          - name: linux-riscv64
            runner: ubuntu-latest
            toolchain: linux-riscv64
            cc: riscv64-linux-musl-gcc
            dist: targz-pkg

          - name: linux-s390x
            runner: ubuntu-latest
            toolchain: linux-s390x
            cc: s390x-linux-musl-gcc
            dist: targz-pkg

          # ----------------------------------------------------------
          # Windows: cross-compiled on ubuntu-latest via llvm-mingw
          # (msvcrt runtime, compatible with Windows XP+).  All three
          # arch variants share a single llvm-mingw-msvcrt toolchain.
          # The release artifact name (matrix.name) drops the runtime
          # flavour — an implementation detail users don't need to see.
          # ----------------------------------------------------------
          - name: windows-amd64
            runner: ubuntu-latest
            toolchain: llvm-mingw-msvcrt
            cc: x86_64-w64-mingw32-gcc
            dist: zip-pkg

          - name: windows-i386
            runner: ubuntu-latest
            toolchain: llvm-mingw-msvcrt
            cc: i686-w64-mingw32-gcc
            dist: zip-pkg

          - name: windows-arm64
            runner: ubuntu-latest
            toolchain: llvm-mingw-msvcrt
            cc: aarch64-w64-mingw32-gcc
            dist: zip-pkg

          # ----------------------------------------------------------
          # macOS: on native runners (Darwin cross-compilation from
          # Linux needs the Apple SDK and is not supported).
          # ----------------------------------------------------------
          - name: macos-arm64
            runner: macos-latest
            cc: clang
            dist: targz-pkg

          - name: macos-amd64
            runner: macos-15-intel
            cc: clang
            dist: targz-pkg

    steps:
      - uses: actions/checkout@v5

      # --- Linux/Windows: fetch toolchain via Makefile.toolchain ---

      - name: cache toolchain
        if: startsWith(matrix.runner, 'ubuntu')
        uses: actions/cache@v5
        with:
          path: toolchains/${{ matrix.toolchain }}
          key: toolchain-${{ matrix.toolchain }}-${{ hashFiles('Makefile.toolchain') }}

      - name: build (cross)
        if: startsWith(matrix.runner, 'ubuntu')
        run: |
          TOOLCHAIN_ENV="$(make -f Makefile.toolchain ${{ matrix.toolchain }})" || exit 1
          eval "$TOOLCHAIN_ENV"
          make STATIC=1 CC=${{ matrix.cc }} ${{ matrix.dist }}

      # --- macOS: native build ---

      - name: build (macos)
        if: startsWith(matrix.runner, 'macos')
        run: |
          brew install coreutils
          make STATIC=1 CC=${{ matrix.cc }} ${{ matrix.dist }}

      - name: verify
        run: file build/ice*

      - name: sign binaries
        if: |
          (startsWith(matrix.name, 'windows-') || startsWith(matrix.name, 'macOS-')) &&
          startsWith(github.ref, 'refs/tags/')
        uses: espressif/release-sign@master
        with:
          path: ./build
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-keyvault-uri: ${{ secrets.AZURE_KEYVAULT_URI }}
          azure-keyvault-cert-name: ${{ secrets.AZURE_KEYVAULT_CERT_NAME }}
          macos-signing-identity: ${{ secrets.MACOS_CS_IDENTITY_ID }}
          macos-certificate: ${{ secrets.MACOS_CS_CERTIFICATE }}
          macos-certificate-pwd: ${{ secrets.MACOS_CS_CERTIFICATE_PWD }}
          notarization-username: ${{ secrets.MACOS_CS_APPLE_ID }}
          notarization-password: ${{ secrets.MACOS_CS_APP_SPECIFIC_PASSWORD }}
          notarization-team-id: ${{ secrets.MACOS_CS_APPLE_TEAM_ID }}

      - name: upload
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: dist/*

  release:
    if: startsWith(github.ref, 'refs/tags/')
    name: release
    needs:
      - dist
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: install commitizen
        run: pip install czespressif

      - name: get version
        id: get_version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
          fi
          echo "VERSION=$VERSION" | tee -a $GITHUB_OUTPUT

      - name: generate changelog
        run: |
          cz changelog ${{ steps.get_version.outputs.VERSION }} --file-name changelog_body.md
          cat changelog_body.md

      - name: create release
        uses: softprops/action-gh-release@v3
        with:
          body_path: changelog_body.md
          name: Version ${{ steps.get_version.outputs.version }}
          draft: true
          files: |
            artifacts/**/*
