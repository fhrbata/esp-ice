name: build-test-release

on:
  workflow_dispatch:
  push:
    tags:
      - v*
  pull_request:

permissions:
  contents: write

jobs:
  lint-linux:
    name: lint linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy clang-format libcurl4-openssl-dev

      - name: lint
        run: make CC=clang clang-format clang-tidy

  lint-macos:
    name: lint macos
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: install
        run: |
          brew install llvm curl
          echo "$(brew --prefix llvm)/bin" >> $GITHUB_PATH

      - name: lint
        run: make CC=clang clang-format clang-tidy

  dist:
    runs-on: ${{ matrix.runner }}
    name: dist ${{ matrix.name }}
    needs:
      - lint-linux
      - lint-macos
    strategy:
      fail-fast: false
      matrix:
        include:
          # ----------------------------------------------------------
          # Linux: cross-compiled on ubuntu-latest via musl.cc
          # toolchains fetched by Makefile.toolchain.
          # ----------------------------------------------------------
          - name: linux-amd64
            runner: ubuntu-latest
            toolchain: linux-amd64
            toolchain_dir: linux-amd64
            cc: x86_64-linux-musl-gcc
            dist: targz-pkg

          - name: linux-arm64
            runner: ubuntu-latest
            toolchain: linux-arm64
            toolchain_dir: linux-arm64
            cc: aarch64-linux-musl-gcc
            dist: targz-pkg

          - name: linux-armel
            runner: ubuntu-latest
            toolchain: linux-armel
            toolchain_dir: linux-armel
            cc: arm-linux-musleabi-gcc
            dist: targz-pkg

          - name: linux-armhf
            runner: ubuntu-latest
            toolchain: linux-armhf
            toolchain_dir: linux-armhf
            cc: arm-linux-musleabihf-gcc
            dist: targz-pkg

          - name: linux-i386
            runner: ubuntu-latest
            toolchain: linux-i386
            toolchain_dir: linux-i386
            cc: i686-linux-musl-gcc
            dist: targz-pkg

          - name: linux-ppc64el
            runner: ubuntu-latest
            toolchain: linux-ppc64el
            toolchain_dir: linux-ppc64el
            cc: powerpc64le-linux-musl-gcc
            dist: targz-pkg

          - name: linux-riscv64
            runner: ubuntu-latest
            toolchain: linux-riscv64
            toolchain_dir: linux-riscv64
            cc: riscv64-linux-musl-gcc
            dist: targz-pkg

          - name: linux-s390x
            runner: ubuntu-latest
            toolchain: linux-s390x
            toolchain_dir: linux-s390x
            cc: s390x-linux-musl-gcc
            dist: targz-pkg

          # ----------------------------------------------------------
          # Windows: cross-compiled on ubuntu-latest via llvm-mingw
          # (msvcrt runtime, compatible with Windows XP+).  All three
          # windows-*-msvcrt targets share toolchains/llvm-mingw-msvcrt.
          # The release artifact name (matrix.name) intentionally drops
          # the -msvcrt suffix; the runtime flavour is an implementation
          # detail users don't need to see.
          # ----------------------------------------------------------
          - name: windows-amd64
            runner: ubuntu-latest
            toolchain: windows-amd64-msvcrt
            toolchain_dir: llvm-mingw-msvcrt
            cc: x86_64-w64-mingw32-gcc
            dist: zip-pkg

          - name: windows-i386
            runner: ubuntu-latest
            toolchain: windows-i386-msvcrt
            toolchain_dir: llvm-mingw-msvcrt
            cc: i686-w64-mingw32-gcc
            dist: zip-pkg

          - name: windows-arm64
            runner: ubuntu-latest
            toolchain: windows-arm64-msvcrt
            toolchain_dir: llvm-mingw-msvcrt
            cc: aarch64-w64-mingw32-gcc
            dist: zip-pkg

          # ----------------------------------------------------------
          # macOS: on native runners (Darwin cross-compilation from
          # Linux needs the Apple SDK and is not supported).
          # ----------------------------------------------------------
          - name: macos-arm64
            runner: macos-latest
            cc: clang
            dist: targz-pkg

          - name: macos-amd64
            runner: macos-15-intel
            cc: clang
            dist: targz-pkg

    steps:
      - uses: actions/checkout@v4

      # --- Linux/Windows: fetch toolchain via Makefile.toolchain ---

      - name: cache toolchain
        if: startsWith(matrix.runner, 'ubuntu')
        uses: actions/cache@v4
        with:
          path: toolchains/${{ matrix.toolchain_dir }}
          key: toolchain-${{ matrix.toolchain_dir }}-${{ hashFiles('Makefile.toolchain') }}

      - name: build (cross)
        if: startsWith(matrix.runner, 'ubuntu')
        run: |
          TOOLCHAIN_ENV="$(make -f Makefile.toolchain ${{ matrix.toolchain }})" || exit 1
          eval "$TOOLCHAIN_ENV"
          make STATIC=1 CC=${{ matrix.cc }} ${{ matrix.dist }}

      # --- macOS: native build ---

      - name: build (macos)
        if: startsWith(matrix.runner, 'macos')
        run: |
          brew install coreutils cmake
          make STATIC=1 CC=${{ matrix.cc }} ${{ matrix.dist }}

      - name: verify
        run: file build/ice*

      - name: sign binaries
        if: |
          (startsWith(matrix.name, 'windows-') || startsWith(matrix.name, 'macOS-')) &&
          startsWith(github.ref, 'refs/tags/')
        uses: espressif/release-sign@master
        with:
          path: ./build
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-keyvault-uri: ${{ secrets.AZURE_KEYVAULT_URI }}
          azure-keyvault-cert-name: ${{ secrets.AZURE_KEYVAULT_CERT_NAME }}
          macos-signing-identity: ${{ secrets.MACOS_CS_IDENTITY_ID }}
          macos-certificate: ${{ secrets.MACOS_CS_CERTIFICATE }}
          macos-certificate-pwd: ${{ secrets.MACOS_CS_CERTIFICATE_PWD }}
          notarization-username: ${{ secrets.MACOS_CS_APPLE_ID }}
          notarization-password: ${{ secrets.MACOS_CS_APP_SPECIFIC_PASSWORD }}
          notarization-team-id: ${{ secrets.MACOS_CS_APPLE_TEAM_ID }}

      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/*

  release:
    if: startsWith(github.ref, 'refs/tags/')
    name: release
    needs:
      - dist
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: install commitizen
        run: pip install czespressif

      - name: get version
        id: get_version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
          fi
          echo "VERSION=$VERSION" | tee -a $GITHUB_OUTPUT

      - name: generate changelog
        run: |
          cz changelog ${{ steps.get_version.outputs.VERSION }} --file-name changelog_body.md
          cat changelog_body.md

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: changelog_body.md
          name: Version ${{ steps.get_version.outputs.version }}
          draft: true
          files: |
            artifacts/**/*
