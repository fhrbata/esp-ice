# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
---
ci:
  autofix_commit_msg: |
    Apply automatic fixes from pre-commit hooks
  autofix_prs: true
  autoupdate_commit_msg: 'ci: Bump pre-commit hooks'
  autoupdate_schedule: quarterly

minimum_pre_commit_version: 3.3.0
default_install_hook_types: [pre-commit,commit-msg]

# Paths excluded from every hook.  vendor/ holds third-party source
# imported verbatim; re-applying local lint/format/copyright edits on
# every sync would defeat the point of the convention.
exclude: '^vendor/'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-executables-have-shebangs
      - id: mixed-line-ending
        args: ['-f=lf']
      - id: double-quote-string-fixer

  - repo: https://github.com/espressif/conventional-precommit-linter
    rev: v1.11.0
    hooks:
      - id: conventional-precommit-linter
        stages: [commit-msg]

  - repo: https://github.com/espressif/check-copyright/
    rev: v1.1.1
    hooks:
      - id: check-copyright
        args: ['--config', 'check_copyright_config.yaml']

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v22.1.3
    hooks:
      - id: clang-format
        types_or: [c, c++]

  # Platform-abstraction rules (see CONTRIBUTING.md):
  #   - no #ifdef _WIN32/__linux__/... outside platform/
  #   - no POSIX-only <dirent.h>/<sys/select.h>/... includes
  #   - no popen()/pclose()
  # The make target scans the full tree on every invocation, so
  # pass_filenames is off and the hook fires whenever a C source
  # or header changes.
  - repo: local
    hooks:
      - id: lint-platform
        name: lint-platform (CONTRIBUTING.md "Platform abstraction")
        language: system
        entry: make lint-platform
        pass_filenames: false
        types_or: [c, c++]
